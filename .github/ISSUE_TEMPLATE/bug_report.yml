name: Bug report
description: Something isn't working as documented
labels: [bug]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - typeorm-entity-history (core)
        - nestjs-typeorm-history (NestJS wrapper)
        - both / unsure
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Package version, TypeORM version, database + driver, Node.js version (and NestJS version if relevant)
      placeholder: "typeorm-entity-history 0.1.0, typeorm 0.3.25, postgres 16 (pg 8.12), node 22"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead? Include the full error message / stack trace if there is one.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Entity definitions + the code that triggers the bug, or a link to a repro repo. The smaller the repro, the faster the fix.
      render: typescript
    validations:
      required: true
