name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - typeorm-entity-history (core)
        - nestjs-typeorm-history (NestJS wrapper)
        - both / unsure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the library doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? A sketch of the API you'd want to use helps a lot.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you're using now, or other approaches you considered.
