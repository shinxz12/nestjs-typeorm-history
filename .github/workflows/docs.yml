name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'packages/*/src/**'
      - 'typedoc.json'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F typeorm-entity-history build
      - run: pnpm -F nestjs-typeorm-history build
      - run: pnpm docs:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site
      - uses: actions/deploy-pages@v4
